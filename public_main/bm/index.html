<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能ベンチマーク - keke-dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --border: #e5e7eb; --text: #1f2937; --sub: #6b7280; --accent: #3b82f6; }
        
        /* 全体の設定（ズレ防止） */
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background: #ffffff; color: var(--text); margin: 0; padding: 40px 20px; overflow-x: hidden; }
        .container { max-width: 700px; margin: 0 auto; text-align: center; }
        
        header { margin-bottom: 20px; }
        h1 { font-size: 1.2rem; font-weight: 700; color: var(--sub); letter-spacing: 0.1em; }

        .device-badge { font-size: 0.85rem; color: var(--sub); background: #f3f4f6; padding: 12px 25px; border-radius: 100px; display: inline-block; font-weight: 700; margin-bottom: 30px; }

        /* スコア表示：コンテナクエリを使って枠基準で文字サイズ調整 */
        .score-display { 
            margin: 20px 0; 
            padding: 80px 20px; 
            border-radius: 60px; 
            background: #fafafa; 
            border: 3px solid var(--border); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            transition: border-color 0.5s ease;
            
            /* 【重要】この枠の幅を基準に中身を測る設定 */
            container-type: inline-size;
            overflow: hidden;
        }
        
        #total-score { 
            white-space: nowrap; 
            /* 【重要】100cqw（枠の幅100%）を超えないように設定 */
            font-size: clamp(2rem, 14cqw, 10rem); 
            font-weight: 700; 
            line-height: 1; 
            letter-spacing: -4px;
            width: 100%;
            text-align: center;
            display: block;
        }
        
        .score-label { font-size: 1.1rem; color: var(--sub); margin-top: 20px; font-weight: 700; }

        /* 進行状況ボックス */
        .status-box { margin: 30px 0; padding: 40px; background: #f9fafb; border-radius: 40px; border: 1px solid var(--border); }
        #status-text { font-size: 1.1rem; color: var(--text); font-weight: 700; min-height: 1.5em; }
        
        .progress-bar { width: 100%; height: 16px; background: var(--border); margin-top: 30px; border-radius: 20px; overflow: hidden; }
        #bar-inner { 
            width: 0%; 
            height: 100%; 
            background: var(--accent); 
            border-radius: 20px; 
            transition: width 0.4s ease; 
        }

        /* ランキング */
        .ranking-section { margin-top: 80px; text-align: left; }
        .ranking-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; border-bottom: 3px solid var(--border); padding-bottom: 15px; }
        .ranking-list { list-style: none; padding: 0; }
        .ranking-item { display: flex; flex-direction: column; padding: 25px 35px; background: #f9fafb; border-radius: 40px; margin-bottom: 15px; font-weight: 700; }
        .rank-top { display: flex; justify-content: space-between; align-items: center; }
        .rank-num { color: var(--accent); font-size: 1.2rem; margin-right: 15px; }
        .rank-sub { font-size: 0.75rem; color: var(--sub); font-weight: 400; margin-top: 8px; line-height: 1.4; }

        /* 丸いボタン */
        button { margin-top: 40px; background: var(--text); color: #fff; border: none; padding: 22px 80px; border-radius: 100px; font-weight: 700; cursor: pointer; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        button:hover { background: var(--accent); transform: scale(1.03); }
        button:disabled { background: var(--border); cursor: wait; }

        .back-link { display: inline-block; margin-top: 50px; color: var(--sub); text-decoration: none; font-size: 0.9rem; padding: 12px 40px; border: 1px solid var(--border); border-radius: 100px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>ハードウェア性能ベンチマーク</h1></header>

    <div class="device-badge" id="spec-badge">システム構成を取得中...</div>

    <div class="score-display" id="main-display">
        <div id="total-score">0</div>
        <div class="score-label">最終ベンチマークスコア</div>
    </div>

    <div class="status-box">
        <div id="status-text">測定を開始してください</div>
        <div class="progress-bar"><div id="bar-inner"></div></div>
    </div>

    <button id="start-btn" onclick="runBenchmark()">測定を開始する</button>

    <div class="ranking-section">
        <div class="ranking-title">全国順位</div>
        <ul id="ranking-list" class="ranking-list">
            <li class="ranking-item">読み込み中...</li>
        </ul>
    </div>

    <a href="https://keke-dev.net" class="back-link">ホームへ戻る</a>
</div>

<canvas id="gpu-canvas" width="2048" height="2048"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBjQWOa8y2UWgL81HvmEv_yiTCtTbk4cxU",
        authDomain: "keke-dev.firebaseapp.com",
        projectId: "keke-dev",
        storageBucket: "keke-dev.firebasestorage.app",
        messagingSenderId: "131535510066",
        appId: "1:131535510066:web:8f8b7fac5aef71aca23a2b",
        measurementId: "G-EGS7LE2Z44"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function getHardwareDetail() {
        const ua = navigator.userAgent;
        let os = "不明";
        if (ua.includes("iPhone")) os = "iPhone";
        else if (ua.includes("iPad")) os = "iPad";
        else if (ua.includes("Mac")) os = "Mac";
        else if (ua.includes("Android")) os = "Android";
        else if (ua.includes("Win")) os = "Windows";
        const cores = navigator.hardwareConcurrency || "?";
        const ram = navigator.deviceMemory ? navigator.deviceMemory + "GB" : "不明";
        let gpu = "標準GPU";
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        if (gl) {
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            if (debug) {
                gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)
                        .replace(/ANGLE/g, "").replace(/Direct3D.*/g, "").replace(/\(.*\)/g, "").replace(/[^a-zA-Z0-9 ]/g, "").trim();
            }
        }
        return { os, cores, ram, gpu };
    }

    const spec = getHardwareDetail();
    document.getElementById('spec-badge').innerText = `${spec.os} | ${spec.cores}コア | ${spec.ram}メモリ | ${spec.gpu}`;

    async function loadRanking() {
        const list = document.getElementById('ranking-list');
        try {
            const snap = await db.collection("scores").orderBy("score", "desc").limit(15).get();
            list.innerHTML = "";
            let i = 1;
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <li class="ranking-item">
                        <div class="rank-top">
                            <span><span class="rank-num">${i}位</span>${d.os}</span>
                            <span>${Math.floor(d.score).toLocaleString()} 点</span>
                        </div>
                        <div class="rank-sub">${d.cores}コア / ${d.ram} / ${d.gpu}</div>
                    </li>`;
                i++;
            });
        } catch (e) { list.innerHTML = '<li class="ranking-item">読み込み失敗</li>'; }
    }
    window.onload = loadRanking;

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function runBenchmark() {
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status-text');
        const bar = document.getElementById('bar-inner');
        const scoreEl = document.getElementById('total-score');
        const display = document.getElementById('main-display');

        // バーのリセット
        bar.style.transition = 'none';
        bar.style.width = '0%';
        await sleep(50);
        bar.style.transition = 'width 0.4s ease';

        btn.disabled = true;
        scoreEl.innerText = "0";
        display.style.borderColor = "var(--border)";
        let results = [];

        try {
            // CPU
            status.innerText = "CPU処理中...";
            await sleep(2000);
            const s1 = performance.now();
            const limit = 10000000;
            const sieve = new Uint8Array(limit).fill(1);
            for (let i = 2; i < Math.sqrt(limit); i++) { if (sieve[i]) for (let j = i * i; j < limit; j += i) sieve[j] = 0; }
            results.push(3000000 / (performance.now() - s1));
            bar.style.width = "25%";

            // FPU
            status.innerText = "FPU処理中...";
            await sleep(2000);
            const s2 = performance.now();
            const size = 800;
            const a = new Float64Array(size * size).fill(Math.random());
            const b = new Float64Array(size * size).fill(Math.random());
            for (let i = 0; i < size; i++) { for (let j = 0; j < size; j++) { let sum = 0; for (let k = 0; k < size; k++) sum += a[i * size + k] * b[k * size + j]; } }
            results.push(8000000 / (performance.now() - s2));
            bar.style.width = "50%";

            // RAM
            status.innerText = "RAM処理中...";
            await sleep(2000);
            const s3 = performance.now();
            const buffer = new Float64Array(32 * 1024 * 1024 / 8);
            for (let i = 0; i < buffer.length; i++) buffer[i] = i * 1.0001;
            results.push(2000000 / (performance.now() - s3));
            bar.style.width = "75%";

            // GPU
            status.innerText = "GPU処理中...";
            await sleep(2000);
            const gl = document.getElementById('gpu-canvas').getContext('webgl');
            const s4 = performance.now();
            if (gl) {
                for (let i = 0; i < 50000; i++) {
                    gl.clearColor(Math.random(), Math.random(), Math.random(), 1.0);
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    if (i % 1000 === 0) gl.finish();
                }
            }
            let gTime = performance.now() - s4;
            if (gTime < 0.1) gTime = 0.1;
            results.push((18000000 / gTime) * (0.97 + Math.random() * 0.06));
            bar.style.width = "100%";

            // 集計演出
            const total = results.reduce((a, b) => a + b) * (0.99 + Math.random() * 0.02);
            status.innerText = "ベンチマークが完了しました。";
            
            let current = 0;
            const timer = setInterval(async () => {
                current += Math.ceil(total / 80);
                if (current >= total) {
                    current = total;
                    clearInterval(timer);
                    display.style.borderColor = "var(--accent)";
                    
                    await db.collection("scores").add({
                        os: spec.os, cores: spec.cores, ram: spec.ram, gpu: spec.gpu,
                        score: total, date: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await loadRanking();
                    btn.disabled = false;
                    btn.innerText = "再ベンチマークを実施する";
                }
                scoreEl.innerText = Math.floor(current).toLocaleString();
            }, 20);

        } catch (e) {
            status.innerText = "測定中にエラーが発生しました。";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
