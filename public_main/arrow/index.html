<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矢印パスワード</title>
    <!-- M PLUS Rounded 1c フォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #ffffff;
            color: #333333;
        }
        
        /* 間違えた時の揺れるアニメーション */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* ボタンのホバー・タップ時のスタイル */
        .arrow-btn {
            transition: all 0.1s ease;
        }
        .arrow-btn:active {
            transform: scale(0.95);
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- パスワード入力画面 (ロック画面) -->
    <div id="lock-screen" class="w-full max-w-md flex flex-col items-center">
        <h1 id="lock-title" class="text-2xl font-bold mb-8 text-center">読み込み中...</h1>
        
        <!-- 入力された矢印の表示エリア -->
        <div id="input-display" class="flex flex-wrap justify-center gap-2 mb-4 min-h-[40px]">
            <!-- JavaScriptで動的に四角い枠と矢印が追加されます -->
        </div>

        <!-- メッセージ表示エリア (正解・間違いなど) -->
        <div id="message" class="h-6 mb-8 text-red-500 font-bold opacity-0 transition-opacity duration-200">
            ミス！
        </div>

        <!-- 画面上の方向キーパッド -->
        <div id="arrow-pad" class="grid grid-cols-3 grid-rows-3 gap-2 w-48 h-48 select-none">
            <!-- 上 -->
            <button class="arrow-btn col-start-2 row-start-1 bg-white border-2 border-gray-300 rounded-xl flex items-center justify-center shadow-sm" data-dir="up" aria-label="上">
                <svg class="w-8 h-8 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
            <!-- 左 -->
            <button class="arrow-btn col-start-1 row-start-2 bg-white border-2 border-gray-300 rounded-xl flex items-center justify-center shadow-sm" data-dir="left" aria-label="左">
                <svg class="w-8 h-8 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <!-- 下 -->
            <button class="arrow-btn col-start-2 row-start-3 bg-white border-2 border-gray-300 rounded-xl flex items-center justify-center shadow-sm" data-dir="down" aria-label="下">
                <svg class="w-8 h-8 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
            </button>
            <!-- 右 -->
            <button class="arrow-btn col-start-3 row-start-2 bg-white border-2 border-gray-300 rounded-xl flex items-center justify-center shadow-sm" data-dir="right" aria-label="右">
                <svg class="w-8 h-8 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>

        <!-- テキスト編集エリア (編集モードでのみ表示) -->
        <div id="text-edit-container" class="hidden w-full mt-8">
            <label class="block text-left font-bold text-gray-700 text-sm mb-2">表示する文章</label>
            <textarea id="edit-textarea" class="w-full h-40 p-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="ロック解除後に表示する文章を入力してください"></textarea>
            <p class="text-xs text-gray-500 mt-2 font-bold">※パスワードを変更しない場合は、矢印を入力せずに保存ボタンを押してください。</p>
        </div>
        
        <!-- 保存ボタンエリア (編集モードでのみ表示) -->
        <div id="save-container" class="hidden mt-8 flex gap-4">
            <button id="save-btn" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-full shadow hover:bg-blue-700 transition-colors">
                変更を保存する
            </button>
            <button id="clear-btn" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded-full shadow hover:bg-gray-300 transition-colors">
                矢印をやり直す
            </button>
        </div>

        <p id="keyboard-hint" class="mt-8 text-sm text-gray-400">キーボードの矢印キーでも入力できます</p>
    </div>

    <!-- 保護されたメインコンテンツ (初期状態は非表示) -->
    <div id="main-content" class="hidden w-full max-w-3xl">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <!-- ヘッダー部分 -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 px-8 py-6 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-gray-800">ロック解除成功</h2>
                <span class="px-3 py-1 bg-green-100 text-green-700 text-sm font-bold rounded-full">認証済み</span>
            </div>
            
            <!-- コンテンツボディ -->
            <div class="p-8 md:p-12 text-left">
                <h3 class="text-xl font-bold text-gray-900 mb-6 border-b-2 border-blue-200 pb-2 inline-block">秘密のメッセージ</h3>
                
                <!-- Firestoreから取得した文章がここに入ります。改行もそのまま表示されます。 -->
                <div id="secret-text-display" class="text-gray-700 leading-relaxed text-lg whitespace-pre-wrap"></div>

                <!-- フッター部分（ボタンなど） -->
                <div class="mt-12 pt-6 border-t border-gray-100 text-center">
                    <button id="lock-again-btn" class="px-8 py-3 bg-gray-800 text-white font-bold rounded-full hover:bg-gray-700 transition-colors shadow-md hover:shadow-lg transform hover:-translate-y-0.5 duration-200">
                        もう一度ロックする
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjQWOa8y2UWgL81HvmEv_yiTCtTbk4cxU",
            authDomain: "keke-dev.firebaseapp.com",
            projectId: "keke-dev",
            storageBucket: "keke-dev.firebasestorage.app",
            messagingSenderId: "131535510066",
            appId: "1:131535510066:web:8f8b7fac5aef71aca23a2b",
            measurementId: "G-EGS7LE2Z44"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // passwordコレクションのmainというドキュメントに保存します
        const passwordDocRef = doc(db, "password", "main");

        let encodedPassword = [];
        let secretContent = "";
        let currentInput = [];
        let isAnimating = false;
        let appMode = 'normal'; // 'normal', 'edit_auth', 'edit_new'

        const lockTitle = document.getElementById('lock-title');
        const displayArea = document.getElementById('input-display');
        const lockScreen = document.getElementById('lock-screen');
        const mainContent = document.getElementById('main-content');
        const messageArea = document.getElementById('message');
        const saveContainer = document.getElementById('save-container');
        const textEditContainer = document.getElementById('text-edit-container');
        const editTextarea = document.getElementById('edit-textarea');
        const secretTextDisplay = document.getElementById('secret-text-display');
        const keyboardHint = document.getElementById('keyboard-hint');

        // URLパラメータの確認 (?edit=true)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('edit') === 'true') {
            appMode = 'edit_auth';
        }

        // 初期化処理: Firestoreからパスワードと文章を読み込む
        async function init() {
            try {
                const docSnap = await getDoc(passwordDocRef);
                if (docSnap.exists()) {
                    encodedPassword = docSnap.data().sequence || [];
                    secretContent = docSnap.data().content || "";
                } else {
                    // データがない場合は初期データをFirestoreに作成
                    encodedPassword = ['dXA=', 'dXA=', 'ZG93bg==', 'ZG93bg==', 'bGVmdA==', 'cmlnaHQ=', 'bGVmdA==', 'cmlnaHQ='];
                    secretContent = "ここにパスワード保護された秘密のコンテンツを表示します。\n\n改行もそのまま反映されます。";
                    await setDoc(passwordDocRef, { sequence: encodedPassword, content: secretContent });
                }
                
                if (appMode === 'edit_auth') {
                    lockTitle.textContent = "現在のパスワードを入力してください";
                } else {
                    lockTitle.textContent = "パスワードを入力してください";
                }
                renderInputDisplay();
            } catch (e) {
                lockTitle.textContent = "エラーが発生しました";
                console.error("Firebase Error:", e);
            }
        }

        // SVGアイコンを返すヘルパー関数
        function getSvgIcon(dir) {
            const baseClass = "w-6 h-6";
            switch(dir) {
                case 'up': return `<svg class="${baseClass}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
                case 'down': return `<svg class="${baseClass}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>`;
                case 'left': return `<svg class="${baseClass}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`;
                case 'right': return `<svg class="${baseClass}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
                default: return '';
            }
        }

        // 入力状況を画面に描画する処理
        function renderInputDisplay() {
            displayArea.innerHTML = '';
            
            if (appMode === 'edit_new') {
                // 新しい設定の入力モード時
                for (let i = 0; i < currentInput.length; i++) {
                    const box = document.createElement('div');
                    box.className = 'w-10 h-10 border-2 rounded-lg flex items-center justify-center transition-colors duration-200 border-blue-500 text-blue-500 bg-blue-50';
                    box.innerHTML = getSvgIcon(currentInput[i]);
                    displayArea.appendChild(box);
                }
                // 次の入力用の空枠
                const nextBox = document.createElement('div');
                nextBox.className = 'w-10 h-10 border-2 border-gray-200 rounded-lg flex items-center justify-center transition-colors duration-200';
                displayArea.appendChild(nextBox);
            } else {
                // 通常・現在のパスワード入力モード時
                if (encodedPassword.length === 0) return;
                for (let i = 0; i < encodedPassword.length; i++) {
                    const box = document.createElement('div');
                    box.className = 'w-10 h-10 border-2 rounded-lg flex items-center justify-center transition-colors duration-200';
                    
                    if (i < currentInput.length) {
                        box.classList.add('border-blue-500', 'text-blue-500', 'bg-blue-50');
                        box.classList.remove('border-gray-200');
                        box.innerHTML = getSvgIcon(currentInput[i]);
                    } else {
                        box.classList.add('border-gray-200');
                    }
                    displayArea.appendChild(box);
                }
            }
        }

        // 入力を処理するメインの関数
        function handleInput(dir) {
            // テキストエリア入力中やアニメーション中は矢印入力を無視する
            if (isAnimating || lockScreen.classList.contains('hidden') || (encodedPassword.length === 0 && appMode !== 'edit_new') || document.activeElement === editTextarea) return;

            currentInput.push(dir);
            renderInputDisplay();

            if (appMode === 'edit_new') {
                // 新しいパスワード入力時は保存ボタンを押すまで判定しない
                return;
            }

            const currentIndex = currentInput.length - 1;
            const encodedInput = btoa(dir);

            // 入力判定
            if (encodedInput !== encodedPassword[currentIndex]) {
                // 不正解の場合
                isAnimating = true;
                
                messageArea.textContent = 'ミス！最初からやり直し';
                messageArea.classList.remove('opacity-0', 'text-green-500');
                messageArea.classList.add('text-red-500');
                displayArea.classList.add('shake');

                setTimeout(() => {
                    currentInput = [];
                    displayArea.classList.remove('shake');
                    messageArea.classList.add('opacity-0');
                    renderInputDisplay();
                    isAnimating = false;
                }, 600);

            } else if (currentInput.length === encodedPassword.length) {
                // 全て正解した場合
                isAnimating = true;
                
                messageArea.textContent = 'せいかい！';
                messageArea.classList.remove('opacity-0', 'text-red-500');
                messageArea.classList.add('text-green-500');

                setTimeout(() => {
                    if (appMode === 'edit_auth') {
                        // 編集モード：設定変更画面へ切り替え
                        appMode = 'edit_new';
                        currentInput = [];
                        lockTitle.textContent = "新しい設定を入力してください";
                        messageArea.classList.add('opacity-0');
                        
                        // 編集用UIの表示
                        textEditContainer.classList.remove('hidden');
                        saveContainer.classList.remove('hidden');
                        keyboardHint.classList.add('hidden'); // 注意書きが干渉するので隠す
                        editTextarea.value = secretContent; // 現在の文章をテキストエリアにセット
                        
                        renderInputDisplay();
                        isAnimating = false;
                    } else {
                        // 通常モード：メイン画面へ切り替え
                        secretTextDisplay.textContent = secretContent; // 取得した文章をセット
                        lockScreen.classList.add('hidden');
                        mainContent.classList.remove('hidden');
                        isAnimating = false;
                    }
                }, 800);
            }
        }

        // 変更を保存する処理
        document.getElementById('save-btn').addEventListener('click', async () => {
            const newContent = editTextarea.value.trim();
            if (!newContent) {
                messageArea.textContent = '文章を入力してください';
                messageArea.classList.remove('opacity-0', 'text-green-500', 'text-blue-500');
                messageArea.classList.add('text-red-500');
                return;
            }

            isAnimating = true;
            messageArea.textContent = '保存中...';
            messageArea.classList.remove('opacity-0', 'text-red-500', 'text-green-500');
            messageArea.classList.add('text-blue-500');

            try {
                // 矢印入力が空の場合は元のパスワードを維持する
                const newEncodedPassword = currentInput.length > 0 ? currentInput.map(dir => btoa(dir)) : encodedPassword;
                
                await setDoc(passwordDocRef, { 
                    sequence: newEncodedPassword,
                    content: newContent
                });
                
                messageArea.textContent = '保存しました！';
                messageArea.classList.remove('text-blue-500', 'text-red-500');
                messageArea.classList.add('text-green-500');
                
                setTimeout(() => {
                    // 編集モードを終了してリロード
                    window.location.href = window.location.pathname;
                }, 1000);
            } catch(e) {
                messageArea.textContent = 'エラーが発生しました';
                messageArea.classList.remove('text-blue-500', 'text-green-500');
                messageArea.classList.add('text-red-500');
                isAnimating = false;
                console.error(e);
            }
        });

        // 矢印入力をやり直す処理
        document.getElementById('clear-btn').addEventListener('click', () => {
            currentInput = [];
            messageArea.classList.add('opacity-0');
            renderInputDisplay();
        });

        // 再びロックする機能
        document.getElementById('lock-again-btn').addEventListener('click', () => {
            currentInput = [];
            messageArea.classList.add('opacity-0');
            mainContent.classList.add('hidden');
            lockScreen.classList.remove('hidden');
            renderInputDisplay();
        });

        // キーボード入力のイベントリスナー
        const keyMapping = {
            'ArrowUp': 'up',
            'ArrowDown': 'down',
            'ArrowLeft': 'left',
            'ArrowRight': 'right'
        };

        document.addEventListener('keydown', (e) => {
            const dir = keyMapping[e.key];
            if (dir) {
                // テキストエリアにフォーカスが当たっている時は、カーソル移動用に矢印キーのデフォルト動作を優先する
                if (document.activeElement === editTextarea) return;
                
                e.preventDefault();
                handleInput(dir);
            }
        });

        // 画面上のボタン入力のイベントリスナー
        document.querySelectorAll('.arrow-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const dir = e.currentTarget.dataset.dir;
                handleInput(dir);
            });
        });

        // 初期化実行
        init();
    </script>
</body>
</html>
