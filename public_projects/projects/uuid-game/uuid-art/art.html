<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Art Labs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <button id="menu-btn" class="icon-btn" aria-label="Menu">
                <span class="material-symbols-rounded">menu</span>
            </button>
            <div class="logo">UUID Labs</div>
        </div>
        <div class="header-right">
            <button id="theme-btn" class="icon-btn" aria-label="Toggle Theme">
                <span class="material-symbols-rounded">dark_mode</span>
            </button>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h2>Saved Art</h2>
            <button id="close-menu-btn" class="icon-btn">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        <ul id="saved-list">
            <li class="empty-msg">保存されたアートはありません</li>
        </ul>
    </nav>
    <div id="overlay"></div>

    <main>
        <div class="canvas-container">
            <canvas id="art-canvas" width="600" height="600"></canvas>
        </div>

        <div class="info-card">
            <div class="user-info" id="user-info-area" style="display: none;">
                <span class="badge">Author</span>
                <span id="display-nickname" class="nickname">Guest</span>
            </div>
            
            <div class="uuid-display">
                <span class="label">Current UUID</span>
                <code id="current-uuid">Generating...</code>
            </div>

            <div class="action-buttons">
                <button id="generate-btn" class="btn primary">
                    <span class="material-symbols-rounded">refresh</span>
                    生成する
                </button>
                <button id="save-btn" class="btn secondary">
                    <span class="material-symbols-rounded">bookmark</span>
                    保存
                </button>
                <button id="share-btn" class="btn secondary">
                    <span class="material-symbols-rounded">share</span>
                    共有
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
