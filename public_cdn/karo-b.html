<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karotterカロートボタンver.1.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-karotter {
      background-color: rgb(25, 128, 243);
    }
  </style>
</head>
<body class="bg-transparent flex items-center justify-center min-h-screen m-0 p-0 overflow-hidden">

  <button id="karotterShareBtn" class="bg-karotter text-white font-bold py-2 px-5 rounded-full shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center gap-2 border-none cursor-pointer">
    <img src="https://cdn.keke-dev.net/media/karotter-log.png" alt="icon" id="shareIcon" class="h-10 w-10 object-contain">
    <span>Karotterでカロート</span>
  </button>

  <script>
    const getShareText = () => {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('text') || '';
    };

    document.getElementById('karotterShareBtn').addEventListener('click', () => {
      const shareText = getShareText();
      const encodedText = encodeURIComponent(shareText);
      const shareUrl = `https://karotter.com/?compose=1&text=${encodedText}`;
      window.open(shareUrl, '_blank');
    });
  </script>

</body>
</html>
