<!doctype html>
<html lang="ja">
<head>
    <meta charSet="UTF-8" />
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0" />
    <title>検索結果 - カウチポテトofficial web</title>
    
    <link href="https://static.amebaowndme.com/madrid-frontend/css/user.min-82c20cadc.css" rel="stylesheet" />
    <link href="https://static.amebaowndme.com/madrid-frontend/css/natalie/index.min-82c20cadc.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="u-txt-clr u-base-bg-clr theme-natalie plan-basic home">
    <div id="content">
        <div class="page u-nav-bg-clr">
            <div class="page__outer">
                <div class="page__inner u-base-bg-clr">
                    <header class="page__header header u-nav-bg-clr u-bdr-clr">
                        <div class="header__inner">
                            <div class="site-logo"><div><img alt="" /></div></div>
                            <nav role="navigation" class="header__nav global-nav u-font">
                                <ul class="global-nav__list">
                                    <li class="global-nav__item u-nav-bdr-clr"><a class="u-nav-clr u-nav-bdr-clr u-font" href="/">HOME</a></li>
                                    <li class="global-nav__item u-nav-bdr-clr"><a class="u-nav-clr u-nav-bdr-clr u-font" href="/profile.html">profile</a></li>
                                    <li class="global-nav__item u-nav-bdr-clr"><a class="u-nav-clr u-nav-bdr-clr u-font" href="/schedule.html">live</a></li>
                                </ul>
                            </nav>
                        </div>
                    </header>
                    
                    <div class="page__main-outer u-base-bg-clr" role="main" style="padding-top: 50px;">
                        <div class="page__main page__main--blog">
                            <div class="row grid grid--l grid-type--title grid--col1">
                                <div class="column col1-1 col1-1--gtr-l">
                                    <div class="block__outer">
                                        <div class="heading-lv2">
                                            <h2 class="heading-lv2__text u-ttl-blk-clr u-ttl-blk-bdr-clr u-font">
                                                <span class="u-base-bg-clr" id="search-title">検索結果</span>
                                            </h2>
                                        </div>
                                    </div>
                                    <div class="block__outer">
                                        <div id="search-container" class="blog-list blog-list--main blog-list--list blog-list--recent">
                                            <p style="text-align:center; padding: 20px;">検索中...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyBss3X4TU521AXPLgWSA_lB6Un1yhO4oRg",
            authDomain: "couchpotato-hp.firebaseapp.com",
            projectId: "couchpotato-hp"
        });
        const db = getFirestore(app);

        async function performSearch() {
            const urlParams = new URLSearchParams(window.location.search);
            const tagQuery = urlParams.get('tagsearch');
            const textQuery = urlParams.get('search');
            
            const container = document.getElementById("search-container");
            const titleLabel = document.getElementById("search-title");
            
            try {
                let querySnapshot;
                
                if (tagQuery) {
                    // タグ検索の場合 (Firestoreの機能で高速検索)
                    titleLabel.textContent = `タグ: #${tagQuery}`;
                    const q = query(collection(db, "news"), where("tags", "array-contains", tagQuery), orderBy("date", "desc"));
                    querySnapshot = await getDocs(q);
                    displayResults(querySnapshot.docs, container);
                    
                } else if (textQuery) {
                    // タイトル検索の場合 (一度全件取得してJSで部分一致絞り込み)
                    titleLabel.textContent = `検索: ${textQuery}`;
                    const q = query(collection(db, "news"), orderBy("date", "desc"));
                    const allDocs = await getDocs(q);
                    
                    // タイトルに検索文字が含まれているものだけを残す
                    const filteredDocs = allDocs.docs.filter(doc => {
                        const title = doc.data().title || "";
                        return title.includes(textQuery);
                    });
                    displayResults(filteredDocs, container);
                    
                } else {
                    container.innerHTML = "<p>検索キーワードが指定されていません。</p>";
                }

            } catch (error) {
                container.innerHTML = "<p>検索エラーが発生しました。</p>";
            }
        }

        // HTMLを組み立てて表示する共通関数
        function displayResults(docsArray, container) {
            container.innerHTML = "";
            if (docsArray.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>該当する記事は見つかりませんでした。</p>";
                return;
            }

            let index = 0;
            docsArray.forEach((docSnap) => {
                const data = docSnap.data();
                const title = data.title || "無題";
                const dateStr = data.date ? data.date.replace(/-/g, ".") : "";
                const linkUrl = `post.html?id=${docSnap.id}`;
                
                const articleHTML = `
                    <article class="blog-item--index${index} blog-list__item blog-item u-bdr-clr">
                        <div class="blog-item__inner">
                            <a class="blog-item__date u-acnt-bg-clr u-font" href="${linkUrl}">
                                <time>${dateStr}</time>
                            </a>
                            <p class="blog-item__text">
                                <a class="u-txt-clr" href="${linkUrl}">${title}</a>
                            </p>
                        </div>
                    </article>
                `;
                container.insertAdjacentHTML('beforeend', articleHTML);
                index++;
            });
        }

        performSearch();
    </script>
</body>
</html>
