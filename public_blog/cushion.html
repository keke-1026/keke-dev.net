<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外部サイトへの移動 - kekelog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f7f9f9;
            margin: 0;
            padding: 0;
            color: #333333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel {
            background: #ffffff;
            border: 1px solid #eef0f2;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            padding: 50px 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 20px 0;
            color: #222222;
        }
        p {
            font-size: 15px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .url-box {
            background: #f8fafc;
            border: 1px solid #eef0f2;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            color: #888888;
            word-break: break-all;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .proceed-btn {
            background: #333333;
            color: #ffffff;
        }
        .proceed-btn:hover {
            background: #111111;
        }
        .back-btn {
            background: #f0f2f5;
            color: #555555;
        }
        .back-btn:hover {
            background: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>外部サイトへ移動します</h1>
        <p>ここから先は kekelog 以外のサイトへ移動します。<br>移動先の安全性をご確認の上、お進みください。</p>
        
        <div class="url-box" id="target-url">URLを読み込んでいます...</div>

        <div class="btn-group">
            <button class="back-btn" onclick="window.close();">閉じる</button>
            <button class="proceed-btn" id="proceed-btn">サイトへ移動</button>
        </div>
    </div>

    <script>
        // URLパラメータから行き先のURLを取得する (?url=xxx)
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');
        const urlBox = document.getElementById("target-url");
        const proceedBtn = document.getElementById("proceed-btn");

        if (targetUrl) {
            urlBox.textContent = targetUrl;
            proceedBtn.addEventListener("click", () => {
                window.location.href = targetUrl;
            });
        } else {
            urlBox.textContent = "URLが指定されていません。";
            proceedBtn.style.display = "none";
        }
    </script>
</body>
</html>
